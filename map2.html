<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Photobooths Map</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    #map {
      height: 600px;
      width: 100%;
      border: 2px solid gray;
      margin: 20px 0;
    }

    body {
      background-color: #cadecb;
    }

    .navbar-brand {
      background-color: #90E0EF;
      padding: 5px 12px;
      border-radius: 5px;
      margin-right: 10px;
      color: black !important;
      text-decoration: none;
    }

    .navbar-brand:hover {
      color: white !important;
    }
  </style>
</head>

<body>

<header>
  <nav class="navbar navbar-expand-lg bg-body-tertiary">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">Home</a>
      <a class="navbar-brand" href="map2.html">Map</a>
    </div>
  </nav>
</header>

<main class="container text-center">
  <h1>Places With Photobooths in Montreal</h1>
  <p>Click a camera icon to explore details.</p>
  <div id="map"></div>
</main>

<footer class="container">
  <p>© 2026 Sydney's site.</p>
</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  // ------------------------------------------------------------
  // Initialize map
  // ------------------------------------------------------------
  var map = L.map('map', {
    minZoom: 10,
    maxZoom: 18
  }).setView([45.520249, -73.640291], 12);

  var street = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
  }).addTo(map);

  var markerLayer = L.layerGroup().addTo(map);

  // ------------------------------------------------------------
  // Camera icon
  // ------------------------------------------------------------
  var cameraIcon = L.icon({
    iconUrl: "https://cdn-icons-png.flaticon.com/512/685/685655.png",
    iconSize: [32, 32],
    iconAnchor: [16, 32],
    popupAnchor: [0, -32]
  });

  // ------------------------------------------------------------
  // CSV (TSV) URL via GitHack to avoid CORS
  // ------------------------------------------------------------
  var csvUrl = "https://raw.githack.com/sreymon/photo-booths/main/photobooths.csv";

  fetch(csvUrl)
    .then(res => res.text())
    .then(text => {
      const rows = text.trim().split(/\r?\n/); // handle Windows/Unix line endings
      const headers = rows[0].split("\t").map(h => h.trim());

      // Find lat/lng columns
      const latIndex = headers.findIndex(h => h.toLowerCase().includes("lat"));
      const lngIndex = headers.findIndex(h => h.toLowerCase().includes("lng"));

      rows.slice(1).forEach(row => {
        const cols = row.split("\t").map(c => c.trim());

        const lat = parseFloat(cols[latIndex]);
        const lng = parseFloat(cols[lngIndex]);

        if (!isNaN(lat) && !isNaN(lng)) {
          const marker = L.marker([lat, lng], { icon: cameraIcon }).addTo(markerLayer);

          let popupContent = `<strong>${cols[0] || "Photobooth"}</strong><br><br>`;
          headers.forEach((header, i) => {
            if (cols[i]) popupContent += `<strong>${header}</strong> ${cols[i]}<br>`;
          });

          marker.bindPopup(popupContent);
          marker.bindTooltip(cols[0], { sticky: true });
        }
      });
    })
    .catch(err => console.error("CSV load error:", err));

  // ------------------------------------------------------------
  // Layer control
  // ------------------------------------------------------------
  L.control.layers(
    { "Street": street },
    { "Photobooths": markerLayer }
  ).addTo(map);

  // ------------------------------------------------------------
  // Click coordinate popup
  // ------------------------------------------------------------
  map.on('click', function (e) {
    L.popup()
      .setLatLng(e.latlng)
      .setContent(`You clicked at: ${e.latlng.lat.toFixed(4)}, ${e.latlng.lng.toFixed(4)}`)
      .openOn(map);
  });
</script>

</body>
</html>
